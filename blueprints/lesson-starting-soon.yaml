blueprint:
  name: "Duroosy — Lesson Starting Soon"
  description: >
    Announces when a lesson is about to start, triggered at an exact offset
    before the lesson's start time.
    Requires the Duroosy integration to be installed and configured.
  domain: automation
  input:
    reminder_unit:
      name: Reminder Unit
      description: Whether to set the reminder in minutes or hours.
      default: minutes
      selector:
        select:
          options:
            - label: "Minutes before"
              value: minutes
            - label: "Hours before"
              value: hours

    reminder_minutes:
      name: Minutes Before (if using minutes)
      description: How many minutes before the lesson to announce.
      default: 15
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: minutes

    reminder_hours:
      name: Hours Before (if using hours)
      description: How many hours before the lesson to announce.
      default: 1
      selector:
        number:
          min: 1
          max: 24
          unit_of_measurement: hours

    announce_method:
      name: Announcement Method
      description: Choose how to make the announcement.
      default: tts
      selector:
        select:
          options:
            - label: "TTS (text-to-speech via speaker)"
              value: tts
            - label: "Run a script"
              value: script

    tts_entity:
      name: TTS Service Entity
      description: >
        (TTS only) The TTS service entity, e.g. tts.home_assistant_cloud.
      default: tts.home_assistant_cloud
      selector:
        entity:
          domain: tts

    media_player:
      name: Media Player / Speaker
      description: (TTS only) The speaker or display to announce on.
      default: media_player.living_room
      selector:
        entity:
          domain: media_player

    message_template:
      name: Announcement Message
      description: >
        (TTS only) Jinja2 template for the spoken message.
        Variables: student_names, student_names_ar, lesson_title, offset_label.
      default: "{{ student_names }}'s {{ lesson_title }} lesson starts in {{ offset_label }}."
      selector:
        text:
          multiline: true

    script_entity:
      name: Script
      description: >
        (Script only) Script to run. Receives: student_names, student_names_ar,
        lesson_title, offset_label, offset_seconds.
      default: script.duroosy_lesson_reminder
      selector:
        entity:
          domain: script

variables:
  unit: !input reminder_unit
  mins: !input reminder_minutes
  hrs: !input reminder_hours
  method: !input announce_method
  offset_seconds: >
    {% if unit == 'hours' %}{{ hrs * 3600 }}{% else %}{{ mins * 60 }}{% endif %}
  offset_label: >
    {% if unit == 'hours' %}
      {{ hrs }} hour{{ 's' if hrs != 1 else '' }}
    {% else %}
      {{ mins }} minute{{ 's' if mins != 1 else '' }}
    {% endif %}
  student_names: >
    {{ state_attr('sensor.duroosy_next_lesson_title', 'student_names') | join(' and ') | default('Your child') }}
  student_names_ar: >
    {{ state_attr('sensor.duroosy_next_lesson_title', 'student_names_ar') | join(' و ') | default('') }}
  lesson_title: "{{ states('sensor.duroosy_next_lesson_title') }}"

trigger:
  - platform: template
    value_template: >
      {{ states('sensor.time') != '' and
         states('sensor.duroosy_next_lesson_start') not in ['unknown', 'unavailable', ''] and
         states('sensor.time') == (
           (as_datetime(states('sensor.duroosy_next_lesson_start')) | as_local).timestamp()
           - offset_seconds | int
           | timestamp_custom('%H:%M', true)
         ) }}

condition:
  - condition: template
    value_template: >
      {{ states('sensor.duroosy_next_lesson_start') not in ['unknown', 'unavailable', ''] }}

action:
  - if:
      - condition: template
        value_template: "{{ method == 'tts' }}"
    then:
      - action: tts.speak
        data:
          entity_id: !input tts_entity
          media_player_entity_id: !input media_player
          message: !input message_template
    else:
      - action: script.turn_on
        target:
          entity_id: !input script_entity
        data:
          variables:
            student_names: "{{ student_names }}"
            student_names_ar: "{{ student_names_ar }}"
            lesson_title: "{{ lesson_title }}"
            offset_label: "{{ offset_label }}"
            offset_seconds: "{{ offset_seconds }}"

mode: single
