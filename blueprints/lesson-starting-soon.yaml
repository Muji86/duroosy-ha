blueprint:
  name: "Duroosy — Lesson Starting Soon"
  description: >
    Announces on a speaker when a lesson is about to start.
    Triggered at an exact time offset before the lesson's start time.
    Requires the Duroosy integration to be installed and configured.
  domain: automation
  input:
    reminder_unit:
      name: Reminder Unit
      description: Whether to set the reminder in minutes or hours.
      default: minutes
      selector:
        select:
          options:
            - label: "Minutes before"
              value: minutes
            - label: "Hours before"
              value: hours

    reminder_minutes:
      name: Minutes Before (if using minutes)
      description: How many minutes before the lesson to announce.
      default: 15
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: minutes

    reminder_hours:
      name: Hours Before (if using hours)
      description: How many hours before the lesson to announce.
      default: 1
      selector:
        number:
          min: 1
          max: 24
          unit_of_measurement: hours

    tts_entity:
      name: TTS Service Entity
      description: >
        The TTS service entity to use,
        e.g. tts.home_assistant_cloud or tts.google_translate.
      default: tts.home_assistant_cloud
      selector:
        entity:
          domain: tts

    media_player:
      name: Media Player / Speaker
      description: The speaker or display to announce on.
      selector:
        entity:
          domain: media_player

    message_template:
      name: Announcement Message
      description: >
        The message to announce. Use Jinja2 template syntax.
        Available variables: student_names (English), student_names_ar (Arabic),
        lesson_title, offset_label (e.g. "15 minutes").
        Example: "{{ student_names }}'s {{ lesson_title }} lesson starts in {{ offset_label }}."
      default: "{{ student_names }}'s {{ lesson_title }} lesson starts in {{ offset_label }}."
      selector:
        text:
          multiline: true

variables:
  unit: !input reminder_unit
  mins: !input reminder_minutes
  hrs: !input reminder_hours
  offset_seconds: >
    {% if unit == 'hours' %}
      {{ hrs * 3600 }}
    {% else %}
      {{ mins * 60 }}
    {% endif %}
  offset_label: >
    {% if unit == 'hours' %}
      {{ hrs }} hour{{ 's' if hrs != 1 else '' }}
    {% else %}
      {{ mins }} minute{{ 's' if mins != 1 else '' }}
    {% endif %}
  student_names: "{{ state_attr('sensor.duroosy_next_lesson_title', 'student_names') | join(' and ') | default('Your child') }}"
  student_names_ar: "{{ state_attr('sensor.duroosy_next_lesson_title', 'student_names_ar') | join(' و ') | default('') }}"
  lesson_title: "{{ states('sensor.duroosy_next_lesson_title') }}"

trigger:
  - platform: template
    value_template: >
      {% set start = states('sensor.duroosy_next_lesson_start') %}
      {% if start not in ['unknown', 'unavailable', ''] %}
        {% set start_ts = as_timestamp(start) %}
        {% set now_ts = as_timestamp(now()) %}
        {% set diff = (start_ts - now_ts) | round(0) %}
        {{ diff >= (offset_seconds | int - 30) and diff <= (offset_seconds | int + 30) }}
      {% else %}
        false
      {% endif %}

condition:
  - condition: template
    value_template: >
      {{ states('sensor.duroosy_next_lesson_start') not in ['unknown', 'unavailable', ''] }}

action:
  - action: tts.speak
    data:
      entity_id: !input tts_entity
      media_player_entity_id: !input media_player
      message: !input message_template

mode: single
